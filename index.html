<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CourtVision - Basketball Analytics</title>
  <link href="style.css" rel="stylesheet"/>

</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">CourtVision</div>
      <div class="sub">Basketball analytics dashboard for team comparison and strategy recommendations.</div>
      <div class="nav">
        <button class="active" onclick="showPage('dashboard')">Dashboard</button>
        <button onclick="showPage('comparison')">Comparison</button>
      </div>
    </aside>
    <script>
      fetch(./data.json)
      .then(res => res.json())
      .then(data => {
        data.forEach();
      });
    </script>

    <main class="main">
      <section id="dashboardPage">
        <h1>Dashboard</h1>
        <div class="muted">Select two teams to analyze the matchup.</div>

        <div class="top-bar">
          <div class="pill" id="selectedA">Team A: None</div>
          <div class="pill" id="selectedB">Team B: None</div>
          <button class="analyze-btn" onclick="goToComparison()">Analyze Matchup</button>
        </div>

        <div class="team-grid" id="teamGrid"></div>
      </section>

      <section id="comparisonPage" class="hidden">
        <h1>Matchup Analysis</h1>
        <div class="muted">Head-to-head comparison, radar chart, and game plan.</div>

        <div id="comparisonContent"></div>
      </section>
    </main>
  </div>

  <script>
    const teams = [
      {
        id: "uconn",
        name: "UConn",
        conference: "Big East",
        color: "#2563eb",
        ppg: 81,
        fg: 49,
        three: 37,
        reb: 38,
        ast: 17,
        tov: 11,
        stl: 7,
        blk: 5
      },
      {
        id: "houston",
        name: "Houston",
        conference: "Big 12",
        color: "#dc2626",
        ppg: 74,
        fg: 45,
        three: 35,
        reb: 36,
        ast: 13,
        tov: 9,
        stl: 8,
        blk: 4
      },
      {
        id: "purdue",
        name: "Purdue",
        conference: "Big Ten",
        color: "#f59e0b",
        ppg: 83,
        fg: 50,
        three: 40,
        reb: 37,
        ast: 18,
        tov: 12,
        stl: 5,
        blk: 3
      },
      {
        id: "duke",
        name: "Duke",
        conference: "ACC",
        color: "#1d4ed8",
        ppg: 78,
        fg: 47,
        three: 36,
        reb: 35,
        ast: 16,
        tov: 10,
        stl: 6,
        blk: 6
      }
    ];

    let selectedTeamA = null;
    let selectedTeamB = null;

    function offenseRating(team) {
      return Math.round((team.ppg * 0.4) + (team.ast * 1.2) + (team.fg * 0.6) + (team.three * 0.5));
    }

    function defenseRating(team) {
      return Math.round((team.reb * 0.5) + (team.stl * 2) + (team.blk * 2) - (team.tov * 0.2) + 40);
    }

    function controlRating(team) {
      return Math.round((team.ast * 1.5) - (team.tov * 1.2) + 50);
    }

    function shootingRating(team) {
      return Math.round((team.fg * 0.6) + (team.three * 0.7));
    }

    function renderTeams() {
      const grid = document.getElementById("teamGrid");
      grid.innerHTML = "";

      teams.forEach(team => {
        const isSelected = selectedTeamA?.id === team.id || selectedTeamB?.id === team.id;
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div class="team-color" style="background:${team.color}"></div>
          <div class="team-name">${team.name}</div>
          <div class="team-conf">${team.conference}</div>
          <div class="stats">
            <div class="stat-box">
              <div class="stat-label">Offense</div>
              <div class="stat-value">${offenseRating(team)}</div>
            </div>
            <div class="stat-box">
              <div class="stat-label">Defense</div>
              <div class="stat-value">${defenseRating(team)}</div>
            </div>
            <div class="stat-box">
              <div class="stat-label">PPG</div>
              <div class="stat-value">${team.ppg}</div>
            </div>
            <div class="stat-box">
              <div class="stat-label">3P%</div>
              <div class="stat-value">${team.three}%</div>
            </div>
          </div>
          <button class="select-btn ${isSelected ? 'selected' : ''}">
            ${isSelected ? 'Selected' : 'Select Team'}
          </button>
        `;
        card.querySelector("button").onclick = () => selectTeam(team);
        grid.appendChild(card);
      });

      document.getElementById("selectedA").textContent = "Team A: " + (selectedTeamA ? selectedTeamA.name : "None");
      document.getElementById("selectedB").textContent = "Team B: " + (selectedTeamB ? selectedTeamB.name : "None");
    }

    function selectTeam(team) {
      if (!selectedTeamA) {
        selectedTeamA = team;
      } else if (!selectedTeamB && selectedTeamA.id !== team.id) {
        selectedTeamB = team;
      } else if (selectedTeamA && selectedTeamA.id === team.id) {
        selectedTeamA = null;
      } else if (selectedTeamB && selectedTeamB.id === team.id) {
        selectedTeamB = null;
      } else {
        selectedTeamA = team;
        selectedTeamB = null;
      }
      renderTeams();
    }

    function generateStrategies(a, b) {
      const strategies = [];

      if (a.three > b.three) {
        strategies.push({
          type: "Offense",
          title: "Create perimeter looks",
          text: `${a.name} has the stronger three-point shooting profile. Use drive-and-kick actions and extra passing to generate open perimeter shots.`
        });
      }

      if (a.blk < b.blk) {
        strategies.push({
          type: "Defense",
          title: "Avoid attacking into shot blockers",
          text: `${b.name} protects the rim better. Use ball movement, mid-range pull-ups, and kick-outs instead of forcing contested finishes inside.`
        });
      }

      if (a.tov > b.stl) {
        strategies.push({
          type: "Ball Security",
          title: "Protect the ball under pressure",
          text: `${a.name} can become vulnerable if rushed. Prioritize strong passes, patient half-court sets, and guards initiating offense carefully.`
        });
      }

      if (a.reb > b.reb) {
        strategies.push({
          type: "Rebounding",
          title: "Crash the glass",
          text: `${a.name} has a rebounding edge. Attack second-chance points and make offensive rebounding part of the game plan.`
        });
      }

      if (strategies.length === 0) {
        strategies.push({
          type: "General",
          title: "Play a balanced game",
          text: `This matchup is statistically close. Focus on execution, transition defense, and limiting turnovers.`
        });
      }

      return strategies;
    }

    function radarPoints(values, cx, cy, radius) {
      const labels = values.length;
      return values.map((value, i) => {
        const angle = (-Math.PI / 2) + (2 * Math.PI * i / labels);
        const r = radius * (value / 100);
        const x = cx + Math.cos(angle) * r;
        const y = cy + Math.sin(angle) * r;
        return `${x},${y}`;
      }).join(" ");
    }

    function renderRadar(a, b) {
      const aValues = [
        offenseRating(a),
        defenseRating(a),
        shootingRating(a),
        Math.min(100, a.reb * 2),
        Math.min(100, controlRating(a)),
        Math.min(100, a.ppg)
      ];
      const bValues = [
        offenseRating(b),
        defenseRating(b),
        shootingRating(b),
        Math.min(100, b.reb * 2),
        Math.min(100, controlRating(b)),
        Math.min(100, b.ppg)
      ];

      const labels = [
        ["Offense", 200, 20],
        ["Defense", 335, 95],
        ["Shooting", 335, 245],
        ["Rebounding", 200, 320],
        ["Control", 55, 245],
        ["Tempo", 55, 95]
      ];

      return `
        <div class="card">
          <div class="panel-title">Radar Chart</div>
          <div class="radar-wrap">
            <svg width="400" height="340" viewBox="0 0 400 340">
              <polygon points="200,50 312,110 312,230 200,290 88,230 88,110" fill="none" stroke="#334155"/>
              <polygon points="200,90 276,130 276,210 200,250 124,210 124,130" fill="none" stroke="#334155"/>
              <polygon points="200,130 240,150 240,190 200,210 160,190 160,150" fill="none" stroke="#334155"/>
              <polygon points="${radarPoints(aValues, 200, 170, 120)}" fill="rgba(249,115,22,0.35)" stroke="#f97316" stroke-width="2"/>
              <polygon points="${radarPoints(bValues, 200, 170, 120)}" fill="rgba(56,189,248,0.30)" stroke="#38bdf8" stroke-width="2"/>
              ${labels.map(([text, x, y]) => `<text x="${x}" y="${y}" text-anchor="middle">${text}</text>`).join("")}
            </svg>
          </div>
        </div>
      `;
    }

    function renderComparison() {
      const container = document.getElementById("comparisonContent");

      if (!selectedTeamA || !selectedTeamB) {
        container.innerHTML = `
          <div class="card">
            <div class="panel-title">No matchup selected</div>
            <div class="muted">Go back to the dashboard and select two teams first.</div>
          </div>
        `;
        return;
      }

      const a = selectedTeamA;
      const b = selectedTeamB;
      const strategies = generateStrategies(a, b);

      const bars = [
        ["PPG", a.ppg, b.ppg, 100],
        ["FG%", a.fg, b.fg, 100],
        ["3P%", a.three, b.three, 100],
        ["REB", a.reb, b.reb, 60],
        ["AST", a.ast, b.ast, 30],
        ["TOV", a.tov, b.tov, 20]
      ];

      container.innerHTML = `
        <div class="comparison-layout">
          <div>
            <div class="card">
              <div class="panel-title">Head-to-Head Comparison</div>
              <div class="compare-head">
                <div class="mini-team">
                  <div class="team-name">${a.name}</div>
                  <div class="team-conf">${a.conference}</div>
                  <div>Offense: <strong>${offenseRating(a)}</strong></div>
                  <div>Defense: <strong>${defenseRating(a)}</strong></div>
                </div>
                <div class="vs">VS</div>
                <div class="mini-team">
                  <div class="team-name">${b.name}</div>
                  <div class="team-conf">${b.conference}</div>
                  <div>Offense: <strong>${offenseRating(b)}</strong></div>
                  <div>Defense: <strong>${defenseRating(b)}</strong></div>
                </div>
              </div>

              ${bars.map(([label, av, bv, max]) => `
                <div class="bar-row">
                  <div class="bar-label">
                    <span>${label}</span>
                    <span>${a.name}: ${av} | ${b.name}: ${bv}</span>
                  </div>
                  <div class="bar-track">
                    <div class="bar-fill-a" style="width:${(av / max) * 100}%"></div>
                    <div class="bar-fill-b" style="width:${(bv / max) * 100}%"></div>
                  </div>
                </div>
              `).join("")}
            </div>

            ${renderRadar(a, b)}
          </div>

          <div>
            <div class="card">
              <div class="panel-title">Strategy Recommendations</div>
              <div class="strategy-list">
                ${strategies.map(s => `
                  <div class="strategy-item">
                    <div class="strategy-type">${s.type}</div>
                    <div class="strategy-title">${s.title}</div>
                    <div>${s.text}</div>
                  </div>
                `).join("")}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function showPage(page) {
      document.getElementById("dashboardPage").classList.toggle("hidden", page !== "dashboard");
      document.getElementById("comparisonPage").classList.toggle("hidden", page !== "comparison");

      const buttons = document.querySelectorAll(".nav button");
      buttons.forEach(btn => btn.classList.remove("active"));
      if (page === "dashboard") buttons[0].classList.add("active");
      if (page === "comparison") buttons[1].classList.add("active");

      if (page === "comparison") renderComparison();
    }

    function goToComparison() {
      showPage("comparison");
    }

    renderTeams();
  </script>
</body>
</html>
