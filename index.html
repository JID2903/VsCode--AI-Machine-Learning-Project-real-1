<!DOCTYPE html>
<html>
<head>
    <title>NCAA D1 Analytics Dashboard</title>
</head>
<body>

<h1>NCAA Division I Team Analytics</h1>
<div id="output"></div>

<script>
fetch('stats.xml')
  .then(res => res.text())
  .then(str => (new DOMParser()).parseFromString(str, "text/xml"))
  .then(xml => {
      const teams = xml.querySelectorAll("Team");
      let html = "<table border='1'>";
      html += "<tr><th>Team</th><th>Record</th><th>OffR</th><th>DefR</th><th>Pace</th><th>SOS</th></tr>";

      teams.forEach(team => {
          const name = team.getAttribute("name");
          const wins = team.querySelector("Record").getAttribute("wins");
          const losses = team.querySelector("Record").getAttribute("losses");
          const off = team.querySelector("OffensiveRating").textContent;
          const def = team.querySelector("DefensiveRating").textContent;
          const pace = team.querySelector("Pace").textContent;
          const sos = team.querySelector("StrengthOfSchedule").textContent;

          html += `<tr>
              <td>${name}</td>
              <td>${wins}-${losses}</td>
              <td>${off}</td>
              <td>${def}</td>
              <td>${pace}</td>
              <td>${sos}</td>
          </tr>`;
      });

      html += "</table>";
      document.getElementById("output").innerHTML = html;
  });
</script>

</body>
</html>
